<!DOCTYPE html>
<html>
<head>
  <title>LiveKit Test</title>
  <style>
    body { background: #0a0a0f; color: #ccc; font-family: 'Segoe UI', monospace; padding: 20px; margin: 0; }
    h1 { color: #c9a227; margin: 0 0 12px; }
    .row { display: flex; gap: 16px; flex-wrap: wrap; }
    .col { flex: 1; min-width: 300px; }
    .panel { background: #111; padding: 12px; border-radius: 8px; margin: 8px 0; }
    .ok { border-left: 3px solid #4ade80; }
    .err { border-left: 3px solid #ef4444; }
    .info { border-left: 3px solid #4db8cc; }
    button { background: #c9a227; color: #0a0a0f; border: none; padding: 8px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; margin: 4px; font-size: 13px; }
    button:hover { opacity: 0.85; }
    .label { color: #555; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 12px; }
    #log { max-height: 300px; overflow-y: auto; font-size: 11px; line-height: 1.5; white-space: pre-wrap; }
    #transcript { min-height: 80px; font-size: 14px; color: #c9a227; }
    video { width: 100%; max-width: 400px; background: #000; border-radius: 8px; }
    input { background: #1a1a2e; border: 1px solid #333; color: #ccc; padding: 6px 10px; border-radius: 4px; width: 100%; font-size: 12px; margin: 4px 0; }
  </style>
</head>
<body>
  <h1>LiveKit Agent Test</h1>

  <div style="margin-bottom: 12px;">
    <div class="label">LiveKit URL</div>
    <input id="lk-url" value="">
    <div class="label">Token</div>
    <input id="lk-token" value="">
  </div>

  <div>
    <button onclick="doConnect()">Connect</button>
    <button onclick="sendMsg('say_hi')">Say Hi</button>
    <button onclick="sendMsg('capture_taken')">Capture</button>
    <button onclick="doMic()">Enable Mic</button>
  </div>

  <div class="label">Status</div>
  <div id="status" class="panel info">Not connected</div>

  <div class="label">Participants</div>
  <div id="participants" class="panel info">-</div>

  <div class="row">
    <div class="col">
      <div class="label">Transcript (TranscriptionReceived)</div>
      <div id="transcript" class="panel">Waiting...</div>

      <div class="label">Data Messages</div>
      <div id="data" class="panel info" style="font-size:12px;">-</div>
    </div>
    <div class="col">
      <div class="label">Video</div>
      <video id="video" autoplay playsinline muted></video>

      <div class="label">Log</div>
      <div id="log" class="panel"></div>
    </div>
  </div>

  <script src="main.js" type="module"></script>
</body>
</html>
